apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-react-app
  namespace: default
  labels:
    app.kubernetes.io/name: dynamic-react-app
    app.kubernetes.io/managed-by: deepagent
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamic-react-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamic-react-app
        app.kubernetes.io/managed-by: deepagent
    spec:
      containers:
        - name: dynamic-react-app
          image: 985465459771.dkr.ecr.us-east-1.amazonaws.com/dynamic-react-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
