apiVersion: v1
kind: Service
metadata:
  name: dynamic-react-app
  namespace: default
  labels:
    app.kubernetes.io/name: dynamic-react-app
    app.kubernetes.io/managed-by: deepagent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dynamic-react-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
