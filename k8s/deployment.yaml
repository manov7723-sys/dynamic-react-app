apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-react-app
  namespace: default
  labels:
    app.kubernetes.io/name: dynamic-react-app
    app.kubernetes.io/managed-by: deepagent
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamic-react-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamic-react-app
        app.kubernetes.io/managed-by: deepagent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dynamic-react-app
          image: "us-central1-docker.pkg.dev/new-project-495604/dynamic-react-app:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
