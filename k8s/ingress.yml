apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dynamic-ingress
  namespace: dev
  labels:
    app: dynamic-app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: tecneuralai.com
    http:
      paths:
      - path: /app1
        pathType: Prefix
        backend:
          service:
            name: dynamic-service
            port:
              number: 80
  - host: crewai.tecneuralai.com
    http:
      paths:
      - path: /app2
        pathType: Prefix
        backend:
          service:
            name: dynamic-service
            port:
              number: 80
  - host: lurobenceai.tecneuralai.com
    http:
      paths:
      - path: /app3
        pathType: Prefix
        backend:
          service:
            name: dynamic-service
            port:
              number: 80