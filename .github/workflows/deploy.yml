name: Deploy to Kubernetes (CD)

# Runs ONLY after the CI workflow ("Build and push to ECR") completes
# successfully, so the image is already in the registry before we deploy.
# Set repo secret KUBECONFIG_B64 (base64 of your kubeconfig) — the app can do this.
on:
  workflow_run:
    workflows: ["Build and push to ECR"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write  # << REQUIRED FOR OIDC!!!
  contents: read  

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context

      - name: Apply manifests
        run: |
          if [ -f k8s/alpha/namespace.yaml ]; then kubectl apply -f k8s/alpha/namespace.yaml; fi
          kubectl apply -n default -f k8s/alpha/

      - name: Wait for rollout
        run: kubectl rollout status deployment/dynamic-react-app -n default --timeout=180s
