name: Deploy to Kubernetes (CD)

# Runs ONLY after the CI workflow ("Build and push to Artifact Registry") completes
# successfully, so the image is already in the registry before we deploy.
on:
  workflow_run:
    workflows: ["Build and push to Artifact Registry"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context

      - name: Apply manifests
        run: kubectl apply -n default -f k8s/release/

      
