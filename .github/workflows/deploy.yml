name: Deploy to Kubernetes (CD)

# Runs ONLY after the CI workflow ("Build and push to ECR") completes
# successfully, so the image is already in the registry before we deploy.
on:
  workflow_run:
    workflows: ["Build and push to ECR"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access (keyless)
        run: aws eks update-kubeconfig --name "dev-cluster" --region ${{ vars.AWS_REGION }}

      - name: Apply manifests
        run: kubectl apply -n default -f k8s/dev/

      - name: Restart rollout (image tag "latest" — force pods onto the new build)
        run: kubectl rollout restart deployment/dynamic-react-app -n default

      - name: Wait for rollout
        run: kubectl rollout status deployment/dynamic-react-app -n default --timeout=180s

      - name: Rollback on failed rollout
        if: failure()
        run: |
          echo "::warning::Rollout of dynamic-react-app failed its health check — rolling back to the previous revision."
          kubectl rollout undo deployment/dynamic-react-app -n default
          kubectl rollout status deployment/dynamic-react-app -n default --timeout=120s
