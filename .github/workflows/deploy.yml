name: Deploy to Kubernetes (CD)

# Runs ONLY after the CI workflow ("Build and push to ACR") completes
# successfully, so the image is already in the registry before we deploy.
on:
  workflow_run:
    workflows: ["Build and push to ACR"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context

      - name: Ensure namespace exists
        run: kubectl get namespace dynamic-react-app || kubectl create namespace dynamic-react-app

      - name: Apply manifests
        run: kubectl apply -n dynamic-react-app -f k8s/release/

      - name: Restart rollout (image tag "latest" — force pods onto the new build)
        run: kubectl rollout restart deployment/dynamic-react-app -n dynamic-react-app

      - name: Wait for rollout
        run: kubectl rollout status deployment/dynamic-react-app -n dynamic-react-app --timeout=180s

      - name: Rollback on failed rollout
        if: failure()
        run: |
          echo "::warning::Rollout of dynamic-react-app failed its health check — rolling back to the previous revision."
          kubectl rollout undo deployment/dynamic-react-app -n dynamic-react-app
          kubectl rollout status deployment/dynamic-react-app -n dynamic-react-app --timeout=120s
