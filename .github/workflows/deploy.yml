name: Deploy to EKS (alpha)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and push to ECR"]
    types: [completed]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Change if your EKS is in a different region

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0        # Or match your cluster's Kubernetes version

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Test cluster access
        run: kubectl get nodes

      - name: Deploy Namespace (optional)
        run: |
          if [ -f k8s/alpha/namespace.yaml ]; then kubectl apply -f k8s/alpha/namespace.yaml; fi

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/alpha/