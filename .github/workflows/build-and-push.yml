name: Build and push to ECR

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::985465459771:role/gha-ecr-dynamic-app
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and tag image
        env:
          ECR_REPOSITORY: 985465459771.dkr.ecr.us-east-1.amazonaws.com/dynamic-app
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REPOSITORY:latest" .

      - name: Scan image for vulnerabilities (Trivy — stop on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: "985465459771.dkr.ecr.us-east-1.amazonaws.com/dynamic-app:${{ github.sha }}"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        env:
          ECR_REPOSITORY: 985465459771.dkr.ecr.us-east-1.amazonaws.com/dynamic-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY:latest"
