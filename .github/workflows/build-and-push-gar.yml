name: Build and push to Artifact Registry

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write   # required to request the GitHub OIDC token
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (keyless WIF — no stored key)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/470142776262/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: deepagent-gha@new-project-495604.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and tag image
        env:
          IMAGE: us-central1-docker.pkg.dev/new-project-495604/dynamic-react-app/dynamic-react-app
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .


      - name: Push image
        env:
          IMAGE: us-central1-docker.pkg.dev/new-project-495604/dynamic-react-app/dynamic-react-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
