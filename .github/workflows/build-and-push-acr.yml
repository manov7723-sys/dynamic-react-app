name: Build and push to ACR

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR (admin credential from repo secrets)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AGENTMY_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AGENTMY_ACR_USERNAME }}
          password: ${{ secrets.AGENTMY_ACR_PASSWORD }}

      - name: Build and tag image
        env:
          IMAGE: agentmy.azurecr.io/dynamic-react-app
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .

      - name: Scan image for vulnerabilities (Trivy 	6 stop on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: "agentmy.azurecr.io/dynamic-react-app:${{ github.sha }}"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        env:
          IMAGE: agentmy.azurecr.io/dynamic-react-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
