name: Build and push to ACR

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ACR push secrets are present
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_AGENTMY_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_AGENTMY_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_AGENTMY_PASSWORD }}
        run: |
          missing=""
          [ -z "$ACR_LOGIN_SERVER" ] && missing="$missing ACR_AGENTMY_LOGIN_SERVER"
          [ -z "$ACR_USERNAME" ] && missing="$missing ACR_AGENTMY_USERNAME"
          [ -z "$ACR_PASSWORD" ] && missing="$missing ACR_AGENTMY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::DEEPAGENT_ACR_SECRETS_MISSING repo=${{ github.repository }} registry=agentmy missing=$missing"
            echo "One or more ACR admin secrets are missing/empty on this repo. The agent can heal this — say 'repair the ACR push auth' and it will refresh them."
            exit 1
          fi

      - name: Log in to ACR (admin credential from repo secrets)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_AGENTMY_LOGIN_SERVER }}
          username: ${{ secrets.ACR_AGENTMY_USERNAME }}
          password: ${{ secrets.ACR_AGENTMY_PASSWORD }}

      - name: Build and tag image
        env:
          IMAGE: agentmy.azurecr.io/dynamic-react-app
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .


      - name: Push image
        env:
          IMAGE: agentmy.azurecr.io/dynamic-react-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
