server {
    listen 80;
    server_name techneuralai;

    root /usr/share/nginx/html;
    index index.html;

    # App1 - TechneuralAI
    location /app1 {
        try_files $uri /index.html;
    }

    # App2 - CrewAI
    location /app2 {
        try_files $uri /index.html;
    }

    # App3 - LurobenceAI
    location /app3 {
        try_files $uri /index.html;
    }

    # Default - Home page
    location / {
        try_files $uri /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
