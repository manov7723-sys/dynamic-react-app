server {
    listen 80;
    server_name techneuralai.local;

    # Point directly to the folder containing your static build files
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Trick React Router cleanly on entry without using external file dependencies
        proxy_set_header Host $host;
        try_files /index.html =404;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

