server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Deliver raw assets natively without rewriting their filesystems
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|map)$ {
        try_files $uri =404;
    }

    # 2. Match the client layout delivery
    location / {
        # Force Nginx to scan and process HTML file streams
        sub_filter_types text/html;
        
        # Inject the <base href> property right inside the document head.
        # This tells the React runtime it is physically working inside /app1/
        sub_filter '<head>' '<head><base href="/app1/">';
        sub_filter_once on;

        try_files /index.html =404;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

