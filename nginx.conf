server {
    listen 80;
    server_name bookmark;
    root /usr/share/nginx/html;

    location / {
        try_files $uri /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    server_name techneuralai;
    root /usr/share/nginx/html;

    location / {
        rewrite ^ /app1 break;
        try_files $uri /index.html;
