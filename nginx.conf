server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;
    index index.html;

    # DEVOPS CRITICAL: Prevent the backend container from sending gzipped 
    # data so Nginx can read and modify the HTML text streams.
    proxy_set_header Accept-Encoding "";

    location / {
        # Force Nginx to run substitutions on HTML, JS, and CSS files
        sub_filter_types text/html application/javascript text/css;
        
        # Inject JavaScript into <head> to update the router context behind the scenes
        sub_filter '<head>' '<head><script>if(window.location.pathname === "/"){ window.history.replaceState(null, "", "/app1"); }</script>';
        sub_filter_once on;
        
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

