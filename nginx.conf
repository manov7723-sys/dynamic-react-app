server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;
    index index.html;

    # 1. CRITICAL: Serve ALL real files (JS, CSS, assets) safely without rewriting
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|map)$ {
        try_files $uri =404;
    }

    # 2. Match the exact root path and trick React Router
    location = / {
        rewrite ^ /app1 break;
        try_files /index.html =404;
    }

    # 3. Safe router fallback block for internal page deep-linking
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

