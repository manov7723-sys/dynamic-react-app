server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Match real files (CSS, JS, Images) out of the unified root folder
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
    }

    # 2. Match the clean URL path and trick React Router internally
    location / {
        # Secretly rewrite the internal URI to /app1 so React Router wakes up on the correct component
        rewrite ^(.*)$ /app1 break;
        try_files /index.html =404;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

