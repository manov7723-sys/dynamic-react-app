server {
    listen 80;
    server_name techneuralai;
    root /usr/share/nginx/html/app1;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

