server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;

    location / {
        # 1. Force React Router to think the path is /app1 internally
        # 2. 'break' prevents Nginx from entering a 500 redirect loop
        rewrite ^/$ /app1 break;
        
        # Serve the main index.html file from the root
        try_files $uri $uri/ /index.html;
        add_header X-Served-App app1;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

