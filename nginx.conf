server {
    listen 80;
    server_name techneuralai.local;

    # Clean URL: techneuralai.local -> internal app1 files
    location / {
        root /usr/share/nginx/html/app1;
        try_files $uri $uri/ /index.html;
        add_header X-Served-App app1;
    }

    # If an internal asset request explicitly looks for /app1/...
    location /app1/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /app1/index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

