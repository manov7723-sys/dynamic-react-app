server {
    listen 80;
    server_name techneuralai.local;

    # Clean URL: techneuralai.local/ looks straight into app1
    location / {
        root /usr/share/nginx/html/app1;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Served-App app1;
    }

    # Backup if your SPA bundles make hardcoded requests to /app1/...
    location /app1/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /app1/index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

