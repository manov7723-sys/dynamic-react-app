# 1. Main Gateway Server Blocks (Ports 80)
# Maps domains to internal rewritten paths
server { listen 80; server_name techneuralai.local; location / { proxy_pass http://127.0.0; include proxy_params; } }
server { listen 80; server_name crewai.local; location / { proxy_pass http://127.0.0; include proxy_params; } }
server { listen 80; server_name lurobenceai.local; location / { proxy_pass http://127.0.0; include proxy_params; } }

# 2. Internal Static File Delivery Engine (Port 8079)
server {
    listen 8079;
    server_name 127.0.0.1;
    root /usr/share/nginx/html;
    
    # Specific location blocks for sub-app paths
    location /app1/ { try_files $uri $uri/ /index.html; }
    location /app2/ { try_files $uri $uri/ /index.html; }
    location /app3/ { try_files $uri $uri/ /index.html; }
    location / { try_files $uri $uri/ /index.html; }
}
