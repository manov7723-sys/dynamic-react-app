server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;

    location / {
        alias /usr/share/nginx/html/;
        try_files $uri /index.html;
        add_header X-Served-App app1;
    }

    location /app1 {
        alias /usr/share/nginx/html/;
        try_files $uri /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

