server {
    listen 80;
    server_name tech.tecneuralai.com;
    root /usr/share/nginx/html;

    location = / {
        return 301 /app1;
    }

    location /app1 {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

