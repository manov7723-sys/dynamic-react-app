server {
    listen 80;
    server_name techneuralai.local;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Check if an actual asset file exists (like main.js or style.css)
        # If it doesn't exist, route internally to the @react_app1 block
        try_files $uri $uri/ @react_app1;
    }

    location @react_app1 {
        # Force every request on this domain to be read as /app1 by React Router
        rewrite ^(.*)$ /app1 break;
        try_files /index.html =404;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

